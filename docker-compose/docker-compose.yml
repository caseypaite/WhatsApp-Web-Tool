services:
  db:
    image: postgres:16
    container_name: appstack-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-appstack_db}
    volumes:
      - ./data/db:/var/lib/postgresql/data
      - ../backend/src/db/acl_schema.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - appstack-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: appstack-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-appstack_db}
      PORT: ${BACKEND_INTERNAL_PORT:-3000}
      JWT_SECRET: ${JWT_SECRET}
      SIMPLE_AUTH_PASSWORD: ${SIMPLE_AUTH_PASSWORD}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD}
      NODE_ENV: ${NODE_ENV:-production}
      WEBSITE_DOMAIN: ${WEBSITE_DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    volumes:
      - ./data/wwebjs_auth:/app/.wwebjs_auth
      - ./data/uploads:/app/uploads
    depends_on:
      - db
    networks:
      - appstack-network
    ports:
      - "${BACKEND_EXTERNAL_PORT:-3085}:${BACKEND_INTERNAL_PORT:-3000}"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: appstack-frontend
    restart: always
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    networks:
      - appstack-network
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-8080}:80"
    depends_on:
      - backend

networks:
  appstack-network:
    driver: bridge
